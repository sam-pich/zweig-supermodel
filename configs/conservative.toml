[metadata]
id = "conservative"
name = "Conservative"
description = "Later entries and faster risk reduction for comparison research."

[fred]
cache_dir = "data/cache/fred"
prime_series = "MPRIME"
discount_series = ["INTDSRUSM193N", "DPCREDIT"]
installment_debt_series = "NONREVNS"

[market.sp500]
source = "url_csv"
url = "https://raw.githubusercontent.com/datasets/s-and-p-500/main/data/data.csv"
date_col = "Date"
value_col = "SP500"
label = "S&P 500 Index"

[market.rsp]
source = "nasdaq"
symbol = "RSP"
asset_class = "etf"
label = "RSP Equal-Weight Proxy"

[momentum.value_line]
source = "csv"
path = "data/value_line.csv"
date_col = "date"
value_col = "close"
label = "Value Line Composite"
required = false

[backtest]
initial_capital = 10000
cadence = "monthly"
start = "1950-01-01"
end = ""

[models.prime_rate]
threshold = 8.0
large_move = 1.25
initial_state = "sell"

[models.fed]
stale_months = 6
long_quiet_months = 24

[models.installment_debt]
threshold = 8.0
signal_lag_months = 2
initial_state = "sell"

[models.four_percent]
threshold = 0.05
initial_state = "sell"

[models.monetary]
buy_threshold = 6
sell_threshold = 3
initial_state = "sell"

[models.super]
buy_threshold = 7
sell_threshold = 4
initial_state = "sell"
